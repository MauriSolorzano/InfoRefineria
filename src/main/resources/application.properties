spring.application.name=Info-Refineria

#BASE DE DATOS
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER_NAME}
spring.datasource.password=${DB_USER_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=${DB_PLATFORM}

# MinIO
minio.url=https://10.0.0.50/imagenes
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=imagenes

#JWT
security.jwt.private.key=${PRIVATE_KEY}
security.jwt.user.generator=${USER_GENERATOR}

#Configuracion para carga de imagens
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=8080
# DESHABILITAR AUTO-CONFIGURACIONES PROBLEM¡TICAS
spring.security.user.password=disabled
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
